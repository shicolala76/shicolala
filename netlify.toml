# Netlify configuration file
# This optimizes the build process and handles client-side routing redirects for Single Page Applications (SPA)

[build]
  publish = "dist"
  command = "npm run build"

# تحويل طلبات API إلى Render
[[redirects]]
  from = "/api/*"
  to = "https://your-api.onrender.com/api/:splat"
  status = 200
  force = true

# معالجة SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
